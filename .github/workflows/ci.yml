name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust JNI Check
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check engine-jni compiles
        working-directory: engine-jni
        run: cargo check

      - name: Run engine-jni tests
        working-directory: engine-jni
        run: cargo test

      - name: Clippy
        working-directory: engine-jni
        run: cargo clippy -- -D warnings

      - name: Format check
        working-directory: engine-jni
        run: cargo fmt -- --check

  android-build:
    name: Android Build
    runs-on: [self-hosted, linux, x64, plausiden]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: |
          # Gradle wrapper is not yet in the tree (task #8 — Android
          # scaffold is M6 stretch). Skip gracefully instead of failing
          # CI with "No such file or directory". Re-enable when
          # scripts/init-gradle-wrapper.sh ships.
          if [ -x ./gradlew ]; then
            ./gradlew assembleDebug
          else
            echo "::warning::./gradlew not present yet — task #8 Android scaffold pending; skipping APK build"
          fi
